name = "image-editing-arena"
compatibility_date = "2024-01-01"
main = "worker.ts"

[assets]
directory = "./dist"

# Deploy to Replicate's Cloudflare account
# Custom domain: image-editing-arena.replicate.dev
account_id = "45191806b6bd0ba8191dccddce0b6944"

# The worker proxies /api/replicate/* requests to the Replicate API
# This avoids CORS issues since the worker makes server-side requests
# Users still bring their own Replicate API keys via the web interface

# Routes configuration for custom domain
routes = [
  { pattern = "image-editing-arena.replicate.dev", custom_domain = true }
]

